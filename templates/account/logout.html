{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-primary text-white text-center py-4">
                    <h3 class="mb-0">
                        <i class="bi bi-box-arrow-left me-2"></i>
                        {% trans "Sign Out" %}
                    </h3>
                </div>
                <div class="card-body p-4 p-md-5 text-center">
                    <div class="mb-4">
                        <i class="bi bi-question-circle display-1 text-primary mb-3"></i>
                        <h4>{% trans "Are you sure you want to sign out?" %}</h4>
                        <p class="text-muted">
                            You'll need to sign in again to access your account.
                        </p>
                    </div>
                    
                    <form method="post" action="{% url 'account_logout' %}">
                        {% csrf_token %}
                        {% if redirect_field_value %}
                        <input type="hidden" name="{{ redirect_field_name }}" value="{{ redirect_field_value }}"/>
                        {% endif %}
                        
                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-danger btn-lg py-3">
                                <i class="bi bi-box-arrow-left me-2"></i>
                                {% trans "Sign Out" %}
                            </button>
                            <a href="{% url 'home' %}" class="btn btn-outline-secondary btn-lg py-3">
                                <i class="bi bi-house me-2"></i>
                                {% trans "Back to Home" %}
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
