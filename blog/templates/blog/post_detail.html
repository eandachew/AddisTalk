{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>{{ post.title }}</h1>
    <p class="text-muted">By {{ post.author }} on {{ post.created_on|date:"M d, Y" }}</p>
    <div>{{ post.content|safe }}</div>
    <a href="{% url 'post-list' %}" class="btn btn-primary mt-3">Back to posts</a>
</div>
{% endblock %}
